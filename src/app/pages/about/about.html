<div class="scroll-wrapper" #scrollWrapper>
  <section class="about-page" [style.--scroll-progress]="scrollProgress()">
    <div class="about-grid">
      <!-- Left: animated ASCII galaxy -->
      <div class="galaxy-container">
        <app-ascii-art [rotationDirection]="galaxyRotationDirection()" />
      </div>

      <!-- Right: Terminal Bio -->
      <div class="bio-col">
        <!-- Greeting header -->
        <h1 class="greeting-header">
          <span
            [appTextScramble]="currentGreeting()"
            [scrambleDelay]="200"
            (scrambleComplete)="startBioSequence()"
          ></span>
        </h1>

        <div class="bio-lines">
          @for (line of bioLines; track $index) {
            <p class="bio-line">
              @if (showBioLines()) {
                <span class="bio-line-prefix" aria-hidden="true">{{ line.prefix }}</span>
                @if (line.parts) {
                  @for (part of line.parts; track $index) {
                    <span
                      [appTextScramble]="part.text"
                      [class.underline]="part.underline"
                      [class.underline-offset-4]="part.underline"
                      (scrambleComplete)="markPartComplete($last)"
                    ></span>
                  }
                } @else {
                  <span
                    [appTextScramble]="line.text"
                    (scrambleComplete)="markBioLineComplete()"
                  ></span>
                }
              }
              @if ($last && bioSequenceComplete()) {
                <span class="terminal-cursor" aria-hidden="true">_</span>
              }
            </p>
          }
        </div>
      </div>
    </div>
  </section>
</div>
